<script>
    const form = document.getElementById('downloadForm');
    const urlInput = document.getElementById('youtubeUrl');
    const resultSection = document.getElementById('resultSection');
    const downloadLink = document.getElementById('downloadLink');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const videoUrl = urlInput.value.trim();

        // تفعيل حالة التحميل
        document.getElementById('btnText').classList.add('hidden');
        document.getElementById('btnSpinner').classList.remove('hidden');

        try {
            // استخدام خدمة API مجانية (مثل yt-download.org كمثال)
            // ملاحظة: الخدمات المجانية قد تتغير، لكن هذا سيعطيك الوظيفة الأساسية
            const videoId = videoUrl.match(/(?:https?:\/\/)?(?:www\.)?youtube\.com\/watch\?v=([^&]+)/)?.[1] || videoUrl.split('/').pop();
            
            if (videoId) {
                // إعداد واجهة النتيجة
                document.getElementById('videoThumb').src = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
                document.getElementById('videoTitle').textContent = "جارِ تجهيز ملف MP3 الخاص بك...";
                
                // رابط التحميل (نستخدم هنا خدمة تحويل وسيطة شهيرة)
                const downloadApiUrl = `https://api.vevioz.com/api/button/mp3/${videoId}`;
                
                downloadLink.href = downloadApiUrl;
                downloadLink.target = "_blank"; // يفتح التحميل في صفحة جديدة

                // إظهار النتيجة
                resultSection.classList.remove('hidden');
                setTimeout(() => resultSection.classList.remove('opacity-0', 'translate-y-4'), 100);
            }
        } catch (error) {
            alert("عذراً، حدث خطأ أثناء التحويل.");
        } finally {
            document.getElementById('btnText').classList.remove('hidden');
            document.getElementById('btnSpinner').classList.add('hidden');
        }
    });
</script>
